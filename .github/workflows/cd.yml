name: CD - Run PySpark E3 Trans Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'pyspark-transactions/**'
      - 'data/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

permissions:
  contents: write   # required to push the sample output commit

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2  # Latest patch version
        with:
          fetch-depth: 0   # full history so git push is not rejected as non-fast-forward

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0  # Latest patch version
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0  # Latest patch version
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p pyspark-transactions/output

      - name: Run main pipeline
        working-directory: ./pyspark-transactions
        run: |
          python -m e3_contracts_to_transactions.main \
            --contracts data/contracts.csv \
            --claims data/claims.csv \
            --output output/TRANSACTIONS.csv
      
      - name: Upload output as artifact
        uses: actions/upload-artifact@v4.6.0  # Latest patch version
        with:
          name: transactions-output
          path: pyspark-transactions/output/TRANSACTIONS.csv

      - name: Commit sample output to repository
        run: |
          cp pyspark-transactions/output/TRANSACTIONS.csv pyspark-transactions/output/sample_TRANSACTIONS.csv
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyspark-transactions/output/sample_TRANSACTIONS.csv
          git diff --cached --quiet || git commit -m "chore: update sample transactions dataset"
          git push