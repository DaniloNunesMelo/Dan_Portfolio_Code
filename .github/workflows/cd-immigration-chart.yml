name: CD - Immigration Chart

on:
  push:
    branches: [master]
    paths:
      - 'immigration-chart/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: immigration-chart/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_GITHUB }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path="immigration-chart",
              repo_id=f"{os.environ['HF_USERNAME']}/immigration-chart",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=["__pycache__", "*.pyc", ".pytest_cache", "tests/", "ci-reports/"],
          )
          print("Deployed successfully.")
          EOF
