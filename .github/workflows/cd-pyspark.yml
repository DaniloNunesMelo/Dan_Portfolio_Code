name: CD - PySpark Transactions Pipeline

on:
  push:
    branches: [master]
    paths:
      - "pyspark-transactions/**"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: write # required to push the sample output commit;

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run all region pipelines
        working-directory: ./pyspark-transactions
        run: |
          for region in europe_3 north_america_2 asia_pacific_1; do
            echo "--- Running pipeline for $region ---"
            mkdir -p output/$region
            python jobs/pipeline.py \
              --contracts data/$region/contracts.csv \
              --claims    data/$region/claims.csv \
              --output    output/$region/TRANSACTIONS.csv \
              --config    config/$region/parameters.yaml
          done

      - name: Upload outputs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyspark-transactions-output
          path: |
            pyspark-transactions/output/europe_3/TRANSACTIONS.csv
            pyspark-transactions/output/north_america_2/TRANSACTIONS.csv
            pyspark-transactions/output/asia_pacific_1/TRANSACTIONS.csv

      - name: Commit all sample outputs to repository
        run: |
          for region in europe_3 north_america_2 asia_pacific_1; do
            cp pyspark-transactions/output/$region/TRANSACTIONS.csv \
               pyspark-transactions/output/sample_TRANSACTIONS_$region.csv
          done
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyspark-transactions/output/sample_TRANSACTIONS_*.csv
          git diff --cached --quiet || git commit -m "chore(pyspark): update sample transaction datasets [all regions]"
          git push
