name: CD - PySpark Transactions Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'pyspark-transactions/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write   # required to push the sample output commit

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [europe_3, north_america_2, asia_pacific_1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push is not rejected as non-fast-forward

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Create output directory
        run: mkdir -p pyspark-transactions/output/${{ matrix.region }}

      - name: Run main pipeline
        working-directory: ./pyspark-transactions
        run: |
          python jobs/pipeline.py \
            --contracts data/${{ matrix.region }}/contracts.csv \
            --claims    data/${{ matrix.region }}/claims.csv \
            --output    output/${{ matrix.region }}/TRANSACTIONS.csv \
            --config    config/${{ matrix.region }}/parameters.yaml

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyspark-transactions-output-${{ matrix.region }}
          path: pyspark-transactions/output/${{ matrix.region }}/TRANSACTIONS.csv

      - name: Commit sample output to repository
        run: |
          cp pyspark-transactions/output/${{ matrix.region }}/TRANSACTIONS.csv \
             pyspark-transactions/output/sample_TRANSACTIONS_${{ matrix.region }}.csv
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyspark-transactions/output/sample_TRANSACTIONS_${{ matrix.region }}.csv
          git diff --cached --quiet || git commit -m "chore(pyspark): update sample transactions dataset [${{ matrix.region }}]"
          git push
