name: CI - Immigration Chart

on:
  push:
    branches: [main, master]
    paths:
      - 'immigration-chart/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'immigration-chart/**'

concurrency:
  group: ci-immigration-chart-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: immigration-chart/requirements.txt

      - name: Install dependencies
        working-directory: ./immigration-chart
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Create ci-reports directory
        run: mkdir -p immigration-chart/ci-reports

      - name: Lint (Ruff)
        working-directory: ./immigration-chart
        run: |
          ruff check src/ tests/ app.py 2>&1 | tee ci-reports/ruff.log

      - name: Format check (Ruff)
        working-directory: ./immigration-chart
        run: |
          ruff format --check src/ tests/ app.py 2>&1 | tee -a ci-reports/ruff.log

      - name: Run tests with coverage
        working-directory: ./immigration-chart
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:ci-reports/coverage.xml \
            --cov-report=html:ci-reports/coverage-html \
            --cov-fail-under=80 \
            2>&1 | tee ci-reports/pytest.log

      - name: Coverage comment
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: immigration-chart

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports-immigration-chart-python-${{ matrix.python-version }}
          path: immigration-chart/ci-reports/
