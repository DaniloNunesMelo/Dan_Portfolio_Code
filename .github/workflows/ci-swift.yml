name: CI - SWIFT Payment Parser

# Triggers only when files inside swift/ change.
# This keeps the PySpark and SWIFT pipelines independent.
on:
  push:
    branches: [main, master]
    paths:
      - 'swift/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'swift/**'

concurrency:
  group: ci-swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Run all matrix versions even if one fails
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      # ── 1. Check out code ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: swift/requirements.txt

      # ── 3. Install dev dependencies ────────────────────────────────────
      - name: Install dependencies
        working-directory: ./swift
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Create reports directory ────────────────────────────────────
      - name: Create ci-reports directory
        run: mkdir -p swift/ci-reports

      # ── 5. Lint (Ruff) ─────────────────────────────────────────────────
      # Ruff is a fast Python linter. It catches unused imports, style issues, etc.
      - name: Lint (Ruff)
        working-directory: ./swift
        run: |
          ruff check . 2>&1 | tee ci-reports/ruff.log

      # ── 6. Format check (Ruff) ─────────────────────────────────────────
      - name: Format check (Ruff)
        working-directory: ./swift
        run: |
          ruff format --check . 2>&1 | tee -a ci-reports/ruff.log

      # ── 7. Run tests with coverage ─────────────────────────────────────
      # Tests live in swift/tests/ and use only stdlib – no external services needed.
      - name: Run tests with coverage
        working-directory: ./swift
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-omit="tests/*,conftest.py" \
            --cov-report=term-missing \
            --cov-report=xml:ci-reports/coverage.xml \
            --cov-report=html:ci-reports/coverage-html \
            2>&1 | tee ci-reports/pytest.log

      # ── 8. Coverage comment on PR (Python 3.12 only to avoid duplicates) ──
      - name: Coverage comment
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: swift

      # ── 9. Upload reports ──────────────────────────────────────────────
      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports-swift-python-${{ matrix.python-version }}
          path: swift/ci-reports/
