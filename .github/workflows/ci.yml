name: CI - Tests PySpark E3 Trans
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12","3.13"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Create ci-reports directory
        run: mkdir -p pyspark-transactions/ci-reports

      - name: Lint & format check (Ruff)
        working-directory: ./pyspark-transactions
        run: |
          ruff check . 2>&1 | tee ci-reports/ruff.log
          ruff format --check . 2>&1 | tee -a ci-reports/ruff.log

      - name: Type safety check (MyPy)
        working-directory: ./pyspark-transactions
        run: |
          mypy --ignore-missing-imports --check-untyped-defs e3_contracts_to_transactions \
            2>&1 | tee ci-reports/mypy.log

      - name: Run tests with coverage
        working-directory: ./pyspark-transactions
        run: |
          pytest -v \
            --cov=e3_contracts_to_transactions \
            --cov-report=term-missing \
            --cov-report=xml:ci-reports/coverage.xml \
            --cov-report=html:ci-reports/coverage-html \
            2>&1 | tee ci-reports/pytest.log

      - name: Coverage comment
        if: matrix.python-version == '3.12'
        uses: py-cov-action/python-coverage-comment-action@v3.40
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: pyspark-transactions
          COVERAGE_DATA_FILE: pyspark-transactions/.coverage

      - name: Upload CI reports as artifact
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: ci-reports-python-${{ matrix.python-version }}
          path: pyspark-transactions/ci-reports/

