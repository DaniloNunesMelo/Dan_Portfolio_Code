name: CI – PySpark E3 Trans Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install linting tools
          pip install pylint pylint-pyspark pylint-pytest pylint-pydantic pylint-pandas flake8 black isort mypy

      - name: Verify Java
        run: java -version

      - name: Check code formatting with Black
        working-directory: ./pyspark-transactions
        run: |
          black --check . || echo "Code formatting issues detected. Run 'black .' to fix."

      - name: Check import ordering with isort
        working-directory: ./pyspark-transactions
        run: |
          isort --check-only --diff . || echo "Import ordering issues detected. Run 'isort .' to fix."

      - name: Lint with Flake8
        working-directory: ./pyspark-transactions
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Lint with Pylint (PySpark compatible)
        working-directory: ./pyspark-transactions
        run: |
          # Run pylint with PySpark plugin and custom configuration
          pylint --load-plugins pylint_pyspark \
                 --rcfile=.pylintrc \
                 --fail-under=7.0 \
                 $(find . -name "*.py" -not -path "./tests/*") || echo "Pylint issues found - score below threshold"

      - name: Type check with MyPy
        working-directory: ./pyspark-transactions
        run: |
          mypy . --ignore-missing-imports --disallow-untyped-defs --check-untyped-defs || echo "Type checking issues found"

      - name: Run tests with coverage
        working-directory: ./pyspark-transactions
        run: |
          pytest -v --cov=. --cov-report=xml --cov-report=term-missing 2>&1 | tee output/test.log

      - name: Upload test logs as artifact
        uses: actions/upload-artifact@v4.6.0
        if: always()  # Upload even if tests fail
        with:
          name: test-logs-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/output/test.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/coverage.xml
