name: CI – PySpark E3 Trans Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyspark-transactions/requirements.txt', 'pyspark-transactions/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      # Ruff replaces Pylint + Black + isort + Flake8 in one pass
      - name: Lint & format check (Ruff)
        working-directory: ./pyspark-transactions
        run: |
          ruff check .
          ruff format --check .

      - name: Type safety check (MyPy)
        working-directory: ./pyspark-transactions
        run: mypy --ignore-missing-imports --check-untyped-defs src/ tests/

      - name: Run tests with coverage
        working-directory: ./pyspark-transactions
        run: |
          mkdir -p ci-reports
          pytest -v --cov=src --cov-report=xml --cov-report=term-missing 2>&1 | tee ci-reports/test.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: test-logs-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/ci-reports/test.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/coverage.xml
