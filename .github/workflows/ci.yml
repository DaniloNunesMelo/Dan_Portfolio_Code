name: CI – PySpark E3 Trans Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12","3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Lint & format check (Ruff)
        working-directory: ./pyspark-transactions
        run: |
          ruff check .
          ruff format --check .

      - name: Type safety check (MyPy)
        working-directory: ./pyspark-transactions
        run: mypy --ignore-missing-imports --check-untyped-defs e3_contracts_to_transactions

      - name: Run tests with coverage
        working-directory: ./pyspark-transactions
        run: |
          mkdir -p ci-reports
          pytest -v \
            --cov=e3_contracts_to_transactions \
            --cov-report=term-missing \
            --cov-report=xml \
            2>&1 | tee ci-reports/pytest.log

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: pyspark-transactions

      - name: Upload test logs
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-logs-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/ci-reports/pytest.log

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: ./pyspark-transactions/coverage.xml