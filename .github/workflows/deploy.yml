name: Deploy - Run PySpark E3 Trans Pipeline

on:
  # Run after CI passes on main branch
  push:
    branches: [main]
    paths:
      - 'pyspark-transactions/**'
      - 'data/**'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Optional: run on schedule (e.g., daily)
  # schedule:
  #   - cron: '0 2 * * *'  # Run at 2 AM daily

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Only run if CI passed (optional - you can set up branch protection)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Run main pipeline
        working-directory: ./pyspark-transactions
        run: |
          python -m e3_contracts_to_transactions.main \
            --contracts data/contracts.csv \
            --claims data/claims.csv \
            --output ../output/TRANSACTIONS.csv
      
      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: transactions-output
          path: output/TRANSACTIONS.csv
