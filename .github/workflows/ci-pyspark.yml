name: CI - PySpark Transactions

on:
  push:
    branches: [main, master]
    paths:
      - 'pyspark-transactions/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'pyspark-transactions/**'

concurrency:
  group: ci-pyspark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./pyspark-transactions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install -e .

      - name: Create ci-reports directory
        run: mkdir -p pyspark-transactions/ci-reports

      - name: Lint & format check (Ruff)
        working-directory: ./pyspark-transactions
        run: |
          ruff check . 2>&1 | tee ci-reports/ruff.log
          ruff format --check . 2>&1 | tee -a ci-reports/ruff.log

      - name: Type safety check (MyPy)
        working-directory: ./pyspark-transactions
        run: |
          mypy --ignore-missing-imports --check-untyped-defs contracts_to_transactions \
            2>&1 | tee ci-reports/mypy.log

      - name: Run tests with coverage
        working-directory: ./pyspark-transactions
        run: |
          pytest -v \
            --cov=contracts_to_transactions \
            --cov-report=term-missing \
            --cov-report=xml:ci-reports/coverage.xml \
            --cov-report=html:ci-reports/coverage-html \
            2>&1 | tee ci-reports/pytest.log

      - name: Coverage comment
        if: matrix.python-version == '3.12'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: pyspark-transactions

      - name: Upload CI reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports-pyspark-python-${{ matrix.python-version }}
          path: pyspark-transactions/ci-reports/
